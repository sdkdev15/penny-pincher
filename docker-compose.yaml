services:
  nodeapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: penny
    restart: always
    ports:
      - "9002:3000"

  postgres:
    image: postgres:15-alpine
    container_name: penny-postgres
    restart: always
    environment:
      - POSTGRES_USER=penny
      - POSTGRES_PASSWORD=p33nyAdmin
      - POSTGRES_DB=pennydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  receipt-scan:
    build:
      context: ./receipt-scan
      dockerfile: Dockerfile
    container_name: penny-receipt-scan
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - USE_EASYOCR_GPU=true
    device_requests:
      - driver: nvidia
        count: all
        capabilities: [gpu]

volumes:
  pgdata: